<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/dashboard.css">
  <title>Proxy Dashboard</title>
  <script>
    // Add current year to footer
    const currentYear = new Date().getFullYear();
    document.querySelector('.current-year').textContent = currentYear;
  </script>
</head>
<body>
  <div class="wrapper">
    <nav id="sidebar-navigation">
      <h1>Menu</h1>
      <ul>
        <!-- Navigation menu goes here -->
      </ul>
    </nav>
    <main class="container">
      <header class="section-header">
        <h1>Dashboard</h1>
      </header>
      <section class="section-content">
        <div class="cards-container">
          <div class="card" data-widget="proxy-status">
            <header class="card-header">
              <h2>Proxy Status</h2>
            </header>
            <div class="card-body">
              <span>Loading...</span>
            </div>
          </div>
          <div class="card" data-widget="total-connections">
            <header class="card-header">
              <h2>Total Connections</h2>
            </header>
            <div class="card-body">
              <span>Loading...</span>
            </div>
          </div>
          <div class="card" data-widget="active-connections">
            <header class="card-header">
              <h2>Active Connections</h2>
            </header>
            <div class="card-body">
              <span>Loading...</span>
            </div>
          </div>
          <div class="card" data-widget="bandwidth-used">
            <header class="card-header">
              <h2>Bandwidth Used</h2>
            </header>
            <div class="card-body">
              <span>Loading...</span>
            </div>
          </div>
          <div class="wide-card" data-widget="bandwidth-usage-chart">
            <header class="card-header">
              <h2>Bandwidth Usage Graph</h2>
            </header>
            <div class="card-body">
              <canvas id="bandwidth-usage-chart" width="100%" height="400"></canvas>
            </div>
          </div>
          <div class="card" data-widget="active-connections-list">
            <header class="card-header">
              <h2>Active Connections</h2>
            </header>
            <div class="card-body">
              <table id="active-connections-table">
                <thead>
                  <tr>
                    <th>IP Address</th>
                    <th>Time Connected</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Loading...</td>
                    <td>Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card" data-widget="error-log-list">
            <header class="card-header">
              <h2>Error Log</h2>
            </header>
            <div class="card-body">
              <ul id="error-log-list">
                <li>Loading...</li>
              </ul>
            </div>
          </div>
        </div>
      </section>
      <div class="footer">
        <p>&copy; <span class="current-year"></span> Proxy Inc.</p>
      </div>
    </main>
  </div>
</body>
</html>
