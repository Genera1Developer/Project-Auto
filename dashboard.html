<header>
  <div class="container">
    <div class="dashboard-header">
      <div class="graph-container">
        <canvas id="chart" width="100%" height="400"></canvas>
      </div>
      <div class="cards-container">
        <div class="card" data-widget="active-connections">
          <header class="card-header">
            <h2 id="active-connections-heading" class="card-title">Active Connections</h2>
            <div class="actions">
              <button class="btn btn-reload" title="Refresh the list of active connections" type="button" data-target-table="connections" aria-labelledby="active-connections-heading">
                <span class="material-icons md-24">refresh</span>
              </button>
              <button class="btn btn-clear" title="Clear the list of active connections" type="button" data-target-table="connections" aria-labelledby="active-connections-heading">
                <span class="material-icons md-24">clear</span>
              </button>
            </div>
          </header>
          <div class="card-body">
            <table id="connections-table" aria-labelledby="active-connections-heading" class="table">
              <thead>
                <tr>
                  <th scope="col">IP Address</th>
                  <th scope="col">Time Connected</th>
                </tr>
              </thead>
              <tbody id="connections"></tbody>
            </table>
          </div>
        </div>
        <div class="card" data-widget="error-log">
          <header class="card-header">
            <h2 id="error-log-heading" class="card-title">Error Log</h2>
            <div class="actions">
              <button class="btn btn-clear" title="Clear the error log" type="button" data-target-list="errors" aria-labelledby="error-log-heading">
                <span class="material-icons md-24">clear</span>
              </button>
              <button class="btn btn-export" title="Export the error log" type="button" data-target-list="errors" aria-labelledby="error-log-heading">
                <span class="material-icons md-24">file_download</span>
              </button>
            </div>
          </header>
          <div class="card-body">
            <ol id="errors" aria-labelledby="error-log-heading"></ol>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
<main class="container">
  <section class="stats-section">
    <div class="card" data-widget="stats">
      <header class="card-header">
        <h2 id="stats-heading" class="card-title">Stats</h2>
      </header>
      <div class="card-body" id="stats"></div>
    </div>
  </section>
  <section class="active-users-section">
    <div class="card" data-widget="active-users">
      <header class="card-header">
        <h2 id="active-users-heading" class="card-title">Active Users</h2>
        <div class="actions">
          <button class="btn btn-reload" title="Refresh the list of active users" type="button" data-target-table="users" aria-labelledby="active-users-heading">
            <span class="material-icons md-24">refresh</span>
          </button>
          <button class="btn btn-clear" title="Clear the list of active users" type="button" data-target-table="users" aria-labelledby="active-users-heading">
            <span class="material-icons md-24">clear</span>
          </button>
        </div>
      </header>
      <div class="card-body">
        <ol id="users" aria-labelledby="active-users-heading"></ol>
      </div>
    </div>
  </section>
</main>
<footer class="footer">
