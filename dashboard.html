<header>
  <div class="container">
    <div class="dashboard-header">
      <div class="graph-container">
        <canvas id="chart" width="100%" height="400"></canvas>
      </div>
      <div class="cards-container">
        <div class="card active-connections active" data-widget="active-connections">
          <header class="card-header">
            <h2 id="active-connections-heading" class="card-title">Active Connections</h2>
            <div class="actions">
              <button class="btn btn-refresh" aria-labelledby="active-connections-heading" data-target-table="connections" type="button" title="Refresh the list of active connections">
                <span class="material-icons md-24">refresh</span>
              </button>
              <button class="btn btn-clear" aria-labelledby="active-connections-heading" data-target-table="connections" type="button" title="Clear the list of active connections">
                <span class="material-icons md-24">clear</span>
              </button>
            </div>
          </header>
          <div class="card-body">
            <table id="connections-table" class="table">
              <thead>
                <tr>
                  <th scope="col">IP Address</th>
                  <th scope="col">Time Connected</th>
                </tr>
              </thead>
              <tbody id="connections"></tbody>
            </table>
          </div>
        </div>
        <div class="card error-log" data-widget="error-log">
          <header class="card-header">
            <h2 id="error-log-heading" class="card-title">Error Log</h2>
            <div class="actions">
              <button class="btn btn-clear" aria-labelledby="error-log-heading" data-target-list="errors" type="button" title="Clear the error log">
                <span class="material-icons md-24">clear</span>
              </button>
              <button class="btn btn-export" aria-labelledby="error-log-heading" data-target-list="errors" type="button" title="Export the error log">
                <span class="material-icons md-24">file_download</span>
              </button>
            </div>
          </header>
          <div class="card-body">
            <ul id="errors"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
<main class="container">
  <section class="stats-section">
    <div class="card stats active" data-widget="stats">
      <header class="card-header">
        <h2 id="stats-heading" class="card-title">Stats</h2>
        <button class="btn btn-refresh" aria-labelledby="stats-heading" type="button" title="Refresh the stats" data-target-element="stats">
          <span class="material-icons md-24">refresh</span>
        </button>
      </header>
      <div class="card-body" id="stats"></div>
    </div>
  </section>
  <section class="active-users-section">
    <div class="card active-users" data-widget="active-users">
      <header class="card-header">
        <h2 id="active-users-heading" class="card-title">Active Users</h2>
        <div class="actions">
          <button class="btn btn-refresh" aria-labelledby="active-users-heading" data-target-table="users" type="button" title="Refresh the list of active users">
            <span class="material-icons md-24">refresh</span>
          </button>
          <button class="btn btn-clear" aria-labelledby="active-users-heading" data-target-table="users" type="button" title="Clear the list of active users">
            <span class="material-icons md-24">clear</span>
          </button>
        </div>
      </header>
      <div class="card-body">
        <ul id="users"></ul>
      </div>
    </div>
  </section>
</main>
<footer class="footer">
  <div class="container">
    <nav class="footer-nav">
      <ul>
        <li>
          <a href="#">Privacy Policy</a>
        </li>
        <li>
          <a href="#">Terms of Service</a>
        </li>
        <li>
          <a href="#">Contact Us</a>
        </li>
      </ul>
    </nav>
    <div class="footer-info">
      &copy;
      <span class="current-year"></span>
      Proxy Corp
      <span class="footer-attribution">
        <a href="https://www.freepik.com/vectors/background">Background vector created by rawpixel.com - www.freepik.com</a>
      </span>
    </div>
  </div>
</footer>
<script>
  const currentYearEl = document.querySelector('.current-year');
  currentYearEl.textContent = new Date().getFullYear();

  // Make the active-connections card active by default
  const activeConnectionsCard = document.querySelector('.card.active-connections');
  activeConnectionsCard.classList.add('active');

  // Get the buttons and attach event listeners to them
  const buttons = document.querySelectorAll('.btn');
  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      // Get the target element or table
      const target = btn.getAttribute('data-target-table') || btn.getAttribute('data-target-element') || btn.getAttribute('data-target-list');

      // Get the widget name
      const widget = btn.closest('[data-widget]').getAttribute('data-widget');

      if (target && widget) {
        // Make a fetch request to the server
        fetch(`/${widget}/${target}`)
          .then((res) => res.json())
          .then((data) => {
            if (target === 'stats') {
              displayStats(data);
            } else {
              displayList(data, target);
            }
          })
          .catch((error) => {
            console.error('Error fetching data:', error);
          });
      }
    });
  });

  // Function to display stats
  const displayStats = (data) => {
    const statsEl = document.getElementById('stats');
    statsEl.innerHTML = '';

    for (const stat in data) {
      const statEl = document.createElement('p');
      statEl.textContent = `${stat}: ${data[stat]}`;
      statsEl.appendChild(statEl);
    }
  };

  // Function to display a list
  const displayList = (data, target) => {
    const listEl = document.getElementById(target);
    listEl.innerHTML = '';

    data.forEach((item) => {
      const listItemEl = document.createElement('li');
      listItemEl.textContent = item;
      listEl.appendChild(listItemEl);
    });
  };
</script>
