<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="/css/dashboard.css">

    <title>Proxy Dashboard</title>
</head>
<body>
    
    <sidebar-navigation></sidebar-navigation>

    <div class="container">
        <div class="section-header">
            <h1>Dashboard</h1>
        </div>

        <div class="section-content">
            <div class="row">
                <div class="col-6">
                    <div class="card">
                        <div class="card-header">
                            <h2>Proxy Status</h2>
                        </div>
                        <div class="card-body" id="proxy-status">
                            Loading...
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card">
                        <div class="card-header">
                            <h2>Total Connections</h2>
                        </div>
                        <div class="card-body" id="total-connections">
                            Loading...
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card">
                        <div class="card-header">
                            <h2>Active Connections</h2>
                        </div>
                        <div class="card-body" id="active-connections">
                            Loading...
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card">
                        <div class="card-header">
                            <h2>Bandwidth Used</h2>
                        </div>
                        <div class="card-body" id="bandwidth-used">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h2>Bandwidth Usage Graph</h2>
                        </div>
                        <div class="card-body">
                            <canvas id="bandwidth-usage-chart" width="100%" height="400"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h2>Active Connections</h2>
                        </div>
                        <div class="card-body">
                            <table id="active-connections-list">
                                <thead>
                                    <tr>
                                        <th>IP Address</th>
                                        <th>Time Connected</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Loading...</td>
                                        <td>Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h2>Error Log</h2>
                        </div>
                        <div class="card-body">
                            <ul id="error-log-list">
                                <li>Loading...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
