<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="settings.js"></script>
</head>
<body>
    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="settings.html">Settings</a>
    </div>
    <div class="content">
        <h1>Settings</h1>
        <form id="settings-form">
            <div class="row">
                <div class="col-md-6">
                    <label for="proxy-protocol">Proxy Protocol</label>
                    <select name="proxy-protocol" id="proxy-protocol">
                        <option value="http">HTTP</option>
                        <option value="https">HTTPS</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="proxy-port">Proxy Port</label>
                    <input type="number" name="proxy-port" id="proxy-port" min="1" max="65535" value="8080">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label for="proxy-username">Proxy Username</label>
                    <input type="text" name="proxy-username" id="proxy-username">
                </div>
                <div class="col-md-6">
                    <label for="proxy-password">Proxy Password</label>
                    <input type="password" name="proxy-password" id="proxy-password">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label for="bandwidth-limit">Bandwidth Limit (MB/s)</label>
                    <input type="number" name="bandwidth-limit" id="bandwidth-limit" min="0" max="1000">
                </div>
                <div class="col-md-6">
                    <label for="connection-timeout">Connection Timeout (seconds)</label>
                    <input type="number" name="connection-timeout" id="connection-timeout" min="1" max="300">
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <button type="submit" id="save-settings-button">Save Settings</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
