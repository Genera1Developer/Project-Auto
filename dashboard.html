<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #F9F9FB;
      font-family: 'Helvetica', 'Arial', sans-serif;
      margin: 0;
    }

    .container {
      display: grid;
      grid-template-columns: 240px auto;
      height: 100vh;
    }

    .sidebar {
      background-color: #34495E;
      padding: 20px;
    }

    .sidebar-nav {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 0;
    }

    .sidebar-nav a {
      text-decoration: none;
      color: #F9F9FB;
      font-size: 1.2rem;
    }

    .sidebar-nav a:hover {
      color: #00ADB5;
    }

    .main-content {
      padding: 20px;
    }

    .form-container {
      max-width: 400px;
      margin: 0 auto;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-size: 1.2rem;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #DDDDDD;
      border-radius: 5px;
    }

    .button-container {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #00ADB5;
      color: #FFFFFF;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .button-container button:hover {
      background-color: #0096A7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <nav class="sidebar-nav">
        <li><a href="/index.html">Home</a></li>
        <li><a href="/settings.html">Settings</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
      </nav>
    </div>
    <div class="main-content">
      <h1>Web Proxy Settings</h1>

      <div class="form-container">
        <form id="settings-form">
          <label for="protocol">Protocol:</label>
          <select name="protocol" id="protocol">
            <option value="HTTP">HTTP</option>
            <option value="HTTPS">HTTPS</option>
          </select>

          <label for="port">Port:</label>
          <input type="number" id="port" name="port" min="1" max="65535" required>

          <label for="authentication">Authentication:</label>
          <select name="authentication" id="authentication">
            <option value="none">None</option>
            <option value="basic">Basic</option>
            <option value="digest">Digest</option>
          </select>

          <label for="username">Username:</label>
          <input type="text" id="username" name="username">

          <label for="password">Password:</label>
          <input type="password" id="password" name="password">

          <label for="bandwidth-limit">Bandwidth Limit:</label>
          <input type="number" id="bandwidth-limit" name="bandwidth-limit" min="0" max="100" required>

          <div class="button-container">
            <button type="submit">Save</button>
            <button type="reset">Reset</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
