<header>
  <div class="graph-container">
    <canvas id="chart" width="100%" height="400"></canvas>
  </div>
  <div class="cards-container">
    <div class="wide-card" data-widget="active-connections-list">
      <header class="card-header">
        <h2>Active Connections List</h2>
        <button class="reload-btn" title="Refresh the list of active connections" type="button" data-target-table="connections"><span class="material-icons md-24 reload-icon">refresh</span></button>
      </header>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th scope="col">IP Address</th>
              <th scope="col">Time Connected</th>
            </tr>
          </thead>
          <tbody id="connections"></tbody>
        </table>
      </div>
    </div>
    <div class="wide-card" data-widget="error-log-list">
      <header class="card-header">
        <h2>Error Log</h2>
        <button class="clear-btn" title="Clear the error log" type="button" data-target-list="errors"><span class="material-icons md-24 clear-icon">delete</span></button>
      </header>
      <div class="card-body">
        <ul id="errors"></ul>
      </div>
    </div>
  </div>
</header>
<main>
  <section>
    <div class="wide-card" data-widget="stats-card">
      <header class="card-header"><h2>Stats</h2></header>
      <div class="card-body" id="stats"></div>
    </div>
  </section>
  <section>
    <div class="narrow-card" data-widget="active-users-list">
      <header class="card-header">
        <h2>Active Users List</h2>
        <button class="reload-btn" title="Refresh the list of active users" type="button" data-target-table="users"><span class="material-icons md-24 reload-icon">refresh</span></button>
      </header>
      <div class="card-body">
        <ul id="users"></ul>
      </div>
    </div>
  </section>
</main>
<footer class="footer">
  <div class="footer-content">
    <span class="current-year"></span> © Proxy Corp.
    <ul>
      <li><a href="#">Privacy Policy</a></li>
      <li><a href="#">Terms of Service</a></li>
    </ul>
  </div>
</footer>
