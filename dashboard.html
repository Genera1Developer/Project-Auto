<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy - Settings</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: #e5f1f4;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        .sidebar {
            background-color: #3b5998;
            padding: 20px;
            width: 250px;
        }

        .sidebar-link {
            color: #fff;
            text-decoration: none;
            margin-bottom: 10px;
            display: block;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .form {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #3b5998;
            color: #fff;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <a href="/index.html" class="sidebar-link">Home</a>
            <a href="/settings.html" class="sidebar-link">Settings</a>
            <a href="/dashboard.html" class="sidebar-link">Dashboard</a>
        </div>
        <div class="main">
            <div class="form">
                <form id="settings-form">
                    <div class="form-group">
                        <label for="proxy-type">Proxy Type</label>
                        <select name="proxy-type">
                            <option value="http">HTTP</option>
                            <option value="https">HTTPS</option>
                            <option value="socks5">SOCKS5</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="proxy-address">Proxy Address</label>
                        <input type="text" id="proxy-address">
                    </div>
                    <div class="form-group">
                        <label for="proxy-port">Proxy Port</label>
                        <input type="number" id="proxy-port">
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password">
                    </div>
                    <button type="submit">Save</button>
                </form>
            </div>
        </div>
    </div>
    <script src="/js/settings.js"></script>
</body>

</html>
