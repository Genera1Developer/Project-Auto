<header class="card-header">
  <h2 id="alerts-heading" class="card-title">Alerts</h2>
  <button class="card-header-action" aria-label="Refresh Alerts" type="button" id="refresh-alerts">
    <span class="material-icons md-18" aria-hidden="true">refresh</span>
  </button>
</header>
<div class="card-body" id="alerts"></div>
</div>
</section>
</main>
<modal>
<div class="modal-container" id="modal">
  <div class="modal-content">
    <header class="modal-header">
      <h2 id="modal-title" class="modal-title"></h2>
      <button class="close-modal-btn" aria-label="Close modal" type="button" id="close-modal-btn">
        <span class="material-icons md-24" aria-hidden="true">close</span>
      </button>
    </header>
    <div class="modal-body" id="modal-body"></div>
    <footer class="modal-footer">
      <button class="modal-action-btn primary-btn" aria-label="Confirm Action" type="button" id="confirm-modal-action">
        <span class="material-icons md-18" aria-hidden="true">check</span>
        Confirm
      </button>
      <button class="modal-action-btn light-btn" aria-label="Cancel Action" type="button" id="cancel-modal-action">
        <span class="material-icons md-18" aria-hidden="true">close</span>
        Cancel
      </button>
    </footer>
  </div>
</div>
</modal>
