<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="sidebar-nav bg-blue-50 p-6 rounded-md">
      <ul>
        <li><a href="/" class="hover:bg-blue-100 rounded-md p-2">Dashboard</a></li>
        <li><a href="/settings" class="hover:bg-blue-100 rounded-md p-2 active">Settings</a></li>
      </ul>
    </div>
    <main class="flex-1 p-6">
      <h1 class="text-2xl font-bold mb-6">Proxy Settings</h1>
      <form action="/settings" method="POST">
        <div class="form-group mb-6">
          <label class="text-sm font-medium mb-2 block" for="protocol">Protocol:</label>
          <select name="protocol" id="protocol" class="w-full rounded-md border-gray-300 focus:border-blue-500 focus:ring-blue-500 text-gray-900 p-2.5">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
          </select>
        </div>
        <div class="form-group mb-6">
          <label class="text-sm font-medium mb-2 block" for="port">Port:</label>
          <input type="number" name="port" id="port" value="8080" class="w-full rounded-md border-gray-300 focus:border-blue-500 focus:ring-blue-500 text-gray-900 p-2.5" />
        </div>
        <div class="form-group mb-6">
          <label class="text-sm font-medium mb-2 block" for="username">Username:</label>
          <input type="text" name="username" id="username" class="w-full rounded-md border-gray-300 focus:border-blue-500 focus:ring-blue-500 text-gray-900 p-2.5" />
        </div>
        <div class="form-group mb-6">
          <label class="text-sm font-medium mb-2 block" for="password">Password:</label>
          <input type="password" name="password" id="password" class="w-full rounded-md border-gray-300 focus:border-blue-500 focus:ring-blue-500 text-gray-900 p-2.5" />
        </div>
        <div class="form-group mb-6">
          <label class="text-sm font-medium mb-2 block" for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
          <input type="number" name="bandwidth-limit" id="bandwidth-limit" value="100" class="w-full rounded-md border-gray-300 focus:border-blue-500 focus:ring-blue-500 text-gray-900 p-2.5" />
        </div>
        <button type="submit" class="rounded-md bg-blue-500 hover:bg-blue-600 text-white p-3">Save</button>
      </form>
    </main>
  </div>

  <script>
    // Your custom JavaScript goes here
  </script>
</body>

</html>
