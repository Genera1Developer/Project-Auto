<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="style.css">
  <script>
    const formAuth = document.querySelector('form.form-auth');
    const formProxy = document.querySelector('form.form-proxy');

    formAuth.addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.querySelector('#username').value.trim();
      if (!username) {
        alert('Please enter a username.');
        return;
      }

      const password = document.querySelector('#password').value.trim();
      if (!password) {
        alert('Please enter a password.');
        return;
      }

      formAuth.submit();
    });

    formProxy.addEventListener('submit', (e) => {
      e.preventDefault();

      const proxyAddress = document.querySelector('#proxy-address').value.trim();
      if (!proxyAddress) {
        alert('Please enter a proxy address.');
        return;
      }

      const proxyPort = document.querySelector('#proxy-port').value.trim();
      if (!proxyPort) {
        alert('Please enter a proxy port.');
        return;
      }

      formProxy.submit();
    });
  </script>
</head>

<body class="settings-page">
  <nav class="sidebar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="settings.html" class="active">Settings</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <section>
      <h1 class="page-title">Settings</h1>

      <p class="intro">Configure your web proxy settings for secure and anonymous web browsing.</p>

      <div class="section">
        <h2 class="section-title">Authentication</h2>

        <form action="login.php" method="post" class="form form-auth">
          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus autocomplete="username" placeholder="Enter your username">
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </form>
      </div>
      <div class="section">
        <h2 class="section-title">Proxy Settings</h2>

        <form action="proxy.php" method="post" class="form form-proxy">
          <div class="setting-group">
            <label for="proxy-address">Proxy Address</label>
            <input type="text" id="proxy-address" name="proxy-address" required placeholder="Enter the proxy address">
          </div>

          <div class="setting-group">
            <label for="proxy-port">Proxy Port</label>
            <input type="number" id="proxy-port" name="proxy-port" required placeholder="Enter the proxy port">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
