<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="sidebar-nav bg-blue-50 rounded-md">
      <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/settings" class="active">Settings</a></li>
      </ul>
    </div>
    <main>
      <h1>Proxy Settings</h1>
      <form>
        <div class="form-group">
          <label for="protocol">Protocol:</label>
          <select name="protocol" id="protocol">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
          </select>
        </div>
        <div class="form-group">
          <label for="port">Port:</label>
          <input type="number" name="port" id="port" value="8080">
        </div>
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" name="username" id="username">
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" name="password" id="password">
        </div>
        <div class="form-group">
          <label for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
          <input type="number" name="bandwidth-limit" id="bandwidth-limit" value="100">
        </div>
        <button type="submit">Save</button>
      </form>
    </main>
  </div>
</body>
</html>
