<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Error handling for input validation
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const proxyEnabled = document.querySelector('#proxy-enabled');
      const proxyAddress = document.querySelector('#proxy-address');
      const proxyPort = document.querySelector('#proxy-port');
      const bandwidthLimitEnabled = document.querySelector('#bandwidth-limit-enabled');
      const bandwidthLimit = document.querySelector('#bandwidth-limit');

      // Check if proxy is enabled
      if (!proxyEnabled.checked) {
        alert('Proxy must be enabled');
        return;
      }

      // Check if proxy address is valid
      if (!proxyAddress.value) {
        alert('Proxy address cannot be empty');
        return;
      }

      // Check if proxy port is valid
      if (!proxyPort.value || isNaN(proxyPort.value)) {
        alert('Proxy port must be a valid number');
        return;
      }

      // Check if bandwidth limit is enabled and valid
      if (bandwidthLimitEnabled.checked) {
        if (!bandwidthLimit.value || isNaN(bandwidthLimit.value)) {
          alert('Bandwidth limit must be a valid number');
          return;
        }
      }

      // Submit form if all inputs are valid
      form.submit();
    });
  </script>
</head>

<body>
  <div class="sidebar">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="settings.html" class="active">Settings</a>
  </div>

  <div class="main-content">
    <h1>Settings</h1>

    <form action="settings.php" method="post">
      <div class="form-group">
        <label for="proxy-enabled">Enable proxy:</label>
        <input type="checkbox" id="proxy-enabled" name="proxy-enabled" checked>
      </div>

      <div class="form-group">
        <label for="proxy-address">Proxy address:</label>
        <input type="text" id="proxy-address" name="proxy-address" value="localhost">
      </div>

      <div class="form-group">
        <label for="proxy-port">Proxy port:</label>
        <input type="number" id="proxy-port" name="proxy-port" value="8080">
      </div>

      <div class="form-group">
        <label for="bandwidth-limit-enabled">Enable bandwidth limit:</label>
        <input type="checkbox" id="bandwidth-limit-enabled" name="bandwidth-limit-enabled">
      </div>

      <div class="form-group">
        <label for="bandwidth-limit">Bandwidth limit (KB/s):</label>
        <input type="number" id="bandwidth-limit" name="bandwidth-limit" value="100">
      </div>

      <input type="submit" value="Save">
    </form>
  </div>
</body>

</html>
