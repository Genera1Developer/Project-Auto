<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div id="sidebar" class="sidebar-nav bg-blue-50 p-6 rounded-md">
      <ul>
        <li><a href="/" class="hover:bg-blue-100 rounded-md p-2">Dashboard</a></li>
        <li><a href="/settings" class="hover:bg-blue-100 rounded-md p-2 active">Settings</a></li>
      </ul>
    </div>
    <main class="flex-1 p-6">
      <h1 class="text-2xl font-bold mb-6">Proxy Settings</h1>
      <form action="/settings" method="POST">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white rounded-md shadow-md p-6">
            <h2 class="text-lg font-bold mb-4">General</h2>
            <label for="proxy-enabled" class="inline-flex items-center mb-4">
              <input type="checkbox" name="proxy-enabled" id="proxy-enabled" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" checked />
              <span class="ml-2 text-sm text-gray-600">Enable Proxy</span>
            </label>
            <div class="mb-4">
              <label for="proxy-address" class="inline-block mb-2 text-sm font-medium text-gray-900 dark:text-gray-300">Proxy Address</label>
              <input type="text" name="proxy-address" id="proxy-address" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white" placeholder="Enter proxy address" required />
            </div>
            <div class="mb-4">
              <label for="proxy-port" class="inline-block mb-2 text-sm font-medium text-gray-900 dark:text-gray-300">Proxy Port</label>
              <input type="number" name="proxy-port" id="proxy-port" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white" placeholder="Enter proxy port" required />
            </div>
          </div>
          <div class="bg-white rounded-md shadow-md p-6">
            <h2 class="text-lg font-bold mb-4">Protocol</h2>
            <div class="mb-4">
              <label class="inline-flex items-center mb-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                <input type="radio" name="proxy-protocol" id="proxy-protocol-http" value="http" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" checked />
                <span class="ml-2 text-sm text-gray-600">HTTP</span>
              </label>
              <label class="inline-flex items-center mb-2 ml-4 text-sm font-medium text-gray-900 dark:text-gray-300">
                <input type="radio" name="proxy-protocol" id="proxy-protocol-https" value="https" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" />
                <span class="ml-2 text-sm text-gray-600">HTTPS</span>
              </label>
            </div>
          </div>
          <div class="bg-white rounded-md shadow-md p-6">
            <h2 class="text-lg font-bold mb-4">Authentication</h2>
            <div class="mb-4">
              <label for="proxy-username" class="inline-block mb-2 text-sm font-medium text-gray-900 dark:text-gray-300">Username</label>
              <input type="text" name="proxy-username" id="proxy-username" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white" placeholder="Enter proxy username" />
            </div>
            <div class="mb-4">
              <label for="proxy-password" class="inline-block mb-2 text-sm font-medium text-gray-900 dark:text-gray-300">Password</label>
              <input type="password" name="proxy-password" id="proxy-password" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white" placeholder="Enter proxy password" />
            </div>
          </div>
          <div class="bg-white rounded-md shadow-md p-6">
            <h2 class="text-lg font-bold mb-4">Bandwidth Limits</h2>
            <div class="mb-4">
              <label for="bandwidth-limit-enabled" class="inline-flex items-center mb-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                <input type="checkbox" name="bandwidth-limit-enabled" id="bandwidth-limit-enabled" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" />
                <span class="ml-2 text-sm text-gray-600">Enable Bandwidth Limit</span>
              </label>
            </div>
            <div class="inline-flex items-center mb-4">
              <input type="number" name="bandwidth-limit" id="bandwidth-limit" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white" placeholder="Enter bandwidth limit" min="0" />
              <span class="ml-2 text-sm text-gray-600">MB/s</span>
            </div>
          </div>
        </div>
        <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-full">Save</button>
      </form>
    </main>
  </div>

  <script>
    // Your custom JavaScript goes here
  </script>
</body>

</html>
