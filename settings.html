<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Project Auto Proxy</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="sidebar">
    <ul>
      <li><a href="./index.html">Home</a></li>
      <li><a href="./dashboard.html">Dashboard</a></li>
      <li><a href="./settings.html">Settings</a></li>
    </ul>
  </div>
  <div class="content">
    <div class="hero">
      <h1>Project Auto Proxy</h1>
      <p>Lightning-fast and secure</p>
      <div class="ocean-gradient-divider"></div>
      <div class="search-bar-wrapper">
        <form>
          <input type="text" class="rounded-search-bar" placeholder="Enter URL" />
          <button class="rounded-search-button">Go</button>
        </form>
      </div>
      <div class="settings-toggle">
        <button class="toggle-button">Switch to dark mode</button>
      </div>
    </div>
    <div class="status">
      <h2>Proxy Status</h2>
      <div class="indicator"></div>
      <p>Status: <span id="status"></span></p>
      <p>Error: <span id="error"></span></p>
      <p>Connection: <span id="connection"></span></p>
    </div>
  </div>
  <script src="./script.js"></script>
</body>

</html>
