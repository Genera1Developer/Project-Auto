<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div class="sidebar">
        <ul>
          <li><a href="/index.html">Home</a></li>
          <li><a href="/settings.html">Settings</a></li>
          <li><a href="/dashboard.html">Dashboard</a></li>
        </ul>
      </div>

      <main>
        <h1>Proxy Settings</h1>
        <form id="proxy-form">
          <div class="form-group">
            <label for="protocol">Protocol:</label>
            <select name="protocol">
              <option value="http">HTTP</option>
              <option value="https">HTTPS</option>
            </select>
          </div>
          <div class="form-group">
            <label for="port">Port:</label>
            <input type="number" id="port" name="port" min="1" max="65535" value="8080" />
          </div>
          <div class="form-group">
            <label for="authentication">Authentication:</label>
            <input type="checkbox" id="authentication" name="authentication" />
          </div>
          <div class="form-group hidden" id="auth-settings">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" />
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" />
          </div>
          <div class="form-group">
            <label for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
            <input type="number" id="bandwidth-limit" name="bandwidth-limit" min="0" />
          </div>
          <button type="submit" class="btn btn-primary">Save</button>
        </form>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
