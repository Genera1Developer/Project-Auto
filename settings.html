<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="sidebar">
        <ul>
            <li><a href="/index.html" class="sidebar-link">Home</a></li>
            <li><a href="/settings.html" class="sidebar-link">Settings</a></li>
            <li><a href="/dashboard.html" class="sidebar-link">Dashboard</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="settings-block">
            <div class="settings-title">Proxy Configuration</div>
            <div class="settings-content">
                <form id="proxy-form">
                    <div class="form-group">
                        <label for="proxy-protocol">Protocol:</label>
                        <select name="proxy-protocol" id="proxy-protocol">
                            <option value="http">HTTP</option>
                            <option value="https">HTTPS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="proxy-port">Port:</label>
                        <input type="text" name="proxy-port" id="proxy-port">
                    </div>
                    <div class="form-group">
                        <label for="proxy-username">Username:</label>
                        <input type="text" name="proxy-username" id="proxy-username">
                    </div>
                    <div class="form-group">
                        <label for="proxy-password">Password:</label>
                        <input type="password" name="proxy-password" id="proxy-password">
                    </div>
                    <div class="form-group">
                        <label for="proxy-bandwidth-limit">Bandwidth Limit (MB/s):</label>
                        <input type="number" name="proxy-bandwidth-limit" id="proxy-bandwidth-limit">
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
