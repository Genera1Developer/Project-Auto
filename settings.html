<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const forms = document.querySelectorAll('form');

    forms.forEach((form) => {
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const actionUrl = form.getAttribute('action');
        const formData = new FormData(form);

        fetch(actionUrl, {
          method: 'POST',
          body: formData
        })
        .then(response => response.text())
        .then(data => {
          window.location.href = data;
        })
        .catch(error => {
          alert('An error occurred while submitting the form. Please try again.');
        });
      });
    });
  </script>
</head>

<body class="settings-page">
  <aside class="sidebar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="settings.html" class="active">Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <section>
      <h1 class="page-title">Settings</h1>

      <p class="intro">
        Configure your web proxy settings for secure and anonymous web browsing. <br>
        Note that changes made here will require a restart of the proxy service.
      </p>

      <div class="settings-form">
        <form class="form form-auth" action="auth.php">
          <div class="settings-group">
            <h2 class="settings-title">Authentication</h2>

            <div class="input-group">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" required autofocus autocomplete="username" />
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required autocomplete="current-password" />
            </div>
          </div>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>

        <hr />

        <form class="form form-proxy" action="proxy.php">
          <div class="settings-group">
            <h2 class="settings-title">Proxy Settings</h2>

            <div class="input-group">
              <label for="proxy-address">Proxy Address</label>
              <input type="text" id="proxy-address" name="proxy-address" required />
            </div>

            <div class="input-group">
              <label for="proxy-port">Proxy Port</label>
              <input type="number" id="proxy-port" name="proxy-port" required />
            </div>
          </div>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
