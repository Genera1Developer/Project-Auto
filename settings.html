<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const forms = document.querySelectorAll("form");
      forms.forEach(form => {
        form.addEventListener("submit", e => {
          e.preventDefault();

          const actionUrl = form.getAttribute("action");
          const formData = new FormData(form);

          fetch(actionUrl, {
            method: "POST",
            body: formData,
          })
            .then(response => {
              if (!response.ok) {
                throw new Error(response.statusText);
              }
              return response.text();
            })
            .then(data => {
              alert(data);
            })
            .catch(error => {
              alert("An error occurred while submitting the form. Please try again.");
              console.error(error);
            });
        });
      });
    });
  </script>
</head>

<body class="settings-page">
  <aside class="sidebar">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="settings.html" class="active">Settings</a></li>
        <li><a href="#">Logout</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <section>
      <h1 class="page-title">Settings</h1>

      <p class="intro">
        Configure your web proxy settings for secure and anonymous web browsing. Restart the proxy service to apply any changes.
      </p>

      <div class="settings-container">

        <form class="form form-auth" action="auth.php">
          <h2 class="settings-group-title">Authentication</h2>

          <label class="input-container" for="username">
            <span class="label">Username</span>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus autocomplete="username" />
          </label>

          <label for="password" class="input-container">
            <span class="label">Password</span>
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
          </label>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>

        <hr />

        <form class="form form-proxy" action="proxy.php">
          <h2 class="settings-group-title">Proxy Settings</h2>

          <label class="input-container" for="proxy-address">
            <span class="label">Proxy Address</span>
            <input type="text" id="proxy-address" name="proxy-address" placeholder="Enter the proxy address" required />
          </label>

          <label class="input-container" for="proxy-port">
            <span class="label">Proxy Port</span>
            <input type="number" id="proxy-port" name="proxy-port" placeholder="Enter the proxy port" required />
          </label>

          <label class="input-container" for="proxy-type">
            <span class="label">Proxy Type</span>
            <select id="proxy-type" name="proxy-type">
              <option value="http" selected>HTTP</option>
              <option value="socks4">SOCKS4</option>
              <option value="socks5">SOCKS5</option>
            </select>
          </label>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
