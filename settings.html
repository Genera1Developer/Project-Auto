```html
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Auto Proxy</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>

<body class="light-mode">
  <div class="container">
    <header>
      <div class="logo">
        <h1>Project Auto Proxy</h1>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a class="home" href="/">Home</a></li>
          <li><a class="dashboard" href="/dashboard">Dashboard</a></li>
          <li><a class="settings" href="/settings">Settings</a></li>
        </ul>
        <div class="theme-toggle">
          <span>Dark Mode</span>
          <label class="switch">
            <input type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>
      </nav>
    </header>
    <main>
      <div class="side-bar">
        <ul class="side-bar-links">
          <li><a class="home" href="/">Home</a></li>
          <li><a class="dashboard" href="/dashboard">Dashboard</a></li>
          <li><a class="settings" href="/settings">Settings</a></li>
        </ul>
      </div>
      <div class="content">
        <div class="search-container">
          <input type="text" placeholder="Search for a website..." class="search-bar" />
          <button type="submit" class="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="login-container">
          <h2>Login</h2>
          <form id="login-form">
            <div class="input-container">
              <label for="username">Username:</label>
              <input type="text" name="username" id="username" />
            </div>
            <div class="input-container">
              <label for="password">Password:</label>
              <input type="password" name="password" id="password" />
            </div>
            <button type="submit" class="login-btn">Login</button>
          </form>
          <div id="error-message"></div>
        </div>
        <div id="connection-status"></div>
        <div class="proxy-status">
          <span>Proxy Status:</span>
          <span id="proxy-status"></span>
        </div>
      </div>
    </main>
    <footer>
      <p>Copyright © 2023 Project Auto Proxy</p>
    </footer>
  </div>
</body>

</html>
```
