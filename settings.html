<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body class="bg-blue-400 rounded-lg">
    <div class="container flex flex-col h-screen">
        <div class="sidebar bg-blue-500 rounded-lg">
            <ul>
                <li><a href="/index.html" class="sidebar-link">Home</a></li>
                <li><a href="/settings.html" class="sidebar-link active">Settings</a></li>
                <li><a href="/dashboard.html" class="sidebar-link">Dashboard</a></li>
            </ul>
        </div>
        <div class="main-content bg-white rounded-lg m-2">
            <div class="settings-block">
                <div class="settings-title font-bold text-xl mb-4">Proxy Configuration</div>
                <div class="settings-content">
                    <form id="proxy-form" class="flex flex-col gap-4">
                        <div class="form-group">
                            <label for="proxy-protocol" class="font-bold text-lg">Protocol:</label>
                            <select name="proxy-protocol" id="proxy-protocol" class="rounded-lg px-2 py-1">
                                <option value="http">HTTP</option>
                                <option value="https">HTTPS</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="proxy-port" class="font-bold text-lg">Port:</label>
                            <input type="text" name="proxy-port" id="proxy-port" class="rounded-lg px-2 py-1" required>
                        </div>
                        <div class="form-group">
                            <label for="proxy-username" class="font-bold text-lg">Username:</label>
                            <input type="text" name="proxy-username" id="proxy-username" class="rounded-lg px-2 py-1" required>
                        </div>
                        <div class="form-group">
                            <label for="proxy-password" class="font-bold text-lg">Password:</label>
                            <input type="password" name="proxy-password" id="proxy-password" class="rounded-lg px-2 py-1" required>
                        </div>
                        <div class="form-group">
                            <label for="proxy-bandwidth-limit" class="font-bold text-lg">Bandwidth Limit (MB/s):</label>
                            <input type="number" name="proxy-bandwidth-limit" id="proxy-bandwidth-limit" class="rounded-lg px-2 py-1">
                        </div>
                        <button type="submit" class="btn btn-primary rounded-lg px-4 py-2 text-white bg-blue-500 hover:bg-blue-600 active:bg-blue-700">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
```
