<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js"></script>
</head>

<body class="settings-page">
  <aside class="sidebar">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="settings.html" class="active">Settings</a></li>
        <li class="divider"></li>
        <li><a href="#">Logout</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <section class="settings-section">
      <h1 class="page-title">
        Settings
        <span class="note">(Changes require a proxy restart)</span>
      </h1>

      <p class="intro">
        Configure your web proxy settings for secure and anonymous web browsing.
      </p>

      <ul class="settings-tabs">
        <li><a href="#authentication" class="active">Authentication</a></li>
        <li><a href="#proxy">Proxy Settings</a></li>
        <li><a href="#advanced">Advanced</a></li>
      </ul>

      <div class="settings-tab-container" id="authentication">
        <form class="form form-auth" action="auth.php" method="POST">
          <h2 class="settings-group-title">Authentication</h2>

          <label class="input-container">
            <span class="label">Username</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              required
              autofocus
              autocomplete="username"
            />
          </label>

          <label class="input-container">
            <span class="label">Password</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </label>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>

      <div class="settings-tab-container" id="proxy" style="display: none;">
        <form class="form form-proxy" action="proxy.php" method="POST">
          <h2 class="settings-group-title">Proxy Settings</h2>

          <label class="input-container">
            <span class="label">Proxy Address</span>
            <input
              type="text"
              id="proxy-address"
              name="proxy-address"
              placeholder="Enter the proxy address"
              required
            />
          </label>

          <label class="input-container">
            <span class="label">Proxy Port</span>
            <input
              type="number"
              id="proxy-port"
              name="proxy-port"
              placeholder="Enter the proxy port"
              required
            />
          </label>

          <label class="input-container">
            <span class="label">Proxy Type</span>
            <select id="proxy-type" name="proxy-type">
              <option value="http" selected>HTTP</option>
              <option value="socks4">SOCKS4</option>
              <option value="socks5">SOCKS5</option>
            </select>
          </label>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>

      <div class="settings-tab-container" id="advanced" style="display: none;">
        <form class="form form-advanced" action="advanced.php" method="POST">
          <h2 class="settings-group-title">Advanced Settings</h2>

          <label class="input-container">
            <span class="label">Block Ads</span>
            <input type="checkbox" id="block-ads" name="block-ads" />
          </label>

          <label class="input-container">
            <span class="label">Enable SOCKS Proxy</span>
            <input type="checkbox" id="enable-socks" name="enable-socks" />
          </label>

          <label class="input-container">
            <span class="label">Custom Certificate</span>
            <span class="file-input">
              <input
                type="file"
                id="custom-certificate"
                name="custom-certificate"
                accept=".crt"
              />
              <span class="button">Browse</span>
            </span>
          </label>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
