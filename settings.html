<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const formAuth = document.querySelector('form.form-auth');
    const formProxy = document.querySelector('form.form-proxy');

    formAuth.addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.querySelector('#username').value.trim();
      if (!username) {
        alert('Please enter a username.');
        return;
      }

      const password = document.querySelector('#password').value.trim();
      if (!password) {
        alert('Please enter a password.');
        return;
      }

      const redirectUrl = formAuth.getAttribute('action') + '?username=' + username + '&password=' + password;
      window.location.href = redirectUrl;
    });

    formProxy.addEventListener('submit', (e) => {
      e.preventDefault();

      const proxyAddress = document.querySelector('#proxy-address').value.trim();
      const proxyPort = document.querySelector('#proxy-port').value.trim();

      if (!proxyAddress || !proxyPort) {
        alert('Please enter a proxy address and port.');
        return;
      }

      const redirectUrl = formProxy.getAttribute('action') + '?proxy-address=' + proxyAddress + '&proxy-port=' + proxyPort;
      window.location.href = redirectUrl;
    });
  </script>
</head>

<body class="settings-page">
  <aside class="sidebar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="settings.html" class="active">Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <section>
      <h1 class="page-title">Settings</h1>

      <p class="intro">
        Configure your web proxy settings for secure and anonymous web browsing. <br>
        Note that changes made here will require a restart of the proxy service.
      </p>

      <div class="settings-form">
        <form class="form form-auth">
          <div class="settings-group">
            <h2 class="settings-title">Authentication</h2>

            <div class="input-group">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" required autofocus autocomplete="username" />
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required autocomplete="current-password" />
            </div>
          </div>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>

        <hr />

        <form class="form form-proxy">
          <div class="settings-group">
            <h2 class="settings-title">Proxy Settings</h2>

            <div class="input-group">
              <label for="proxy-address">Proxy Address</label>
              <input type="text" id="proxy-address" name="proxy-address" required />
            </div>

            <div class="input-group">
              <label for="proxy-port">Proxy Port</label>
              <input type="number" id="proxy-port" name="proxy-port" required />
            </div>
          </div>

          <div class="btn-container">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
