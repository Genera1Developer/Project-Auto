<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Settings</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <header>
    <div class="logo">
      <img src="./logo.svg" alt="Proxy logo">
    </div>
    <nav>
      <a href="./index.html" class="nav-link">Home</a>
      <a href="./dashboard.html" class="nav-link">Dashboard</a>
      <a href="./settings.html" class="nav-link active">Settings</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1>Proxy Settings</h1>

      <form class="settings-form">
        <label for="protocol">Protocol:</label>
        <select name="protocol" id="protocol">
          <option value="http">HTTP</option>
          <option value="https" selected>HTTPS</option>
        </select>

        <label for="port">Port:</label>
        <input type="number" id="port" name="port" min="1" max="65535" value="8080">

        <label for="username">Username:</label>
        <input type="text" id="username" name="username">

        <label for="password">Password:</label>
        <input type="password" id="password" name="password">

        <label for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
        <input type="number" id="bandwidth-limit" name="bandwidth-limit" min="0" max="1000">

        <button type="submit" class="btn">Save</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2023 ProxyWare</p>
  </footer>

  <script src="./script.js"></script>
</body>

</html>
