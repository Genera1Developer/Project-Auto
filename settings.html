<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/settings.js"></script>
</head>
<body>
    <div class="sidebar">
        <a href="/index.html">Home</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/settings.html" class="active">Settings</a>
    </div>
    <div class="content">
        <h1>Proxy Configuration</h1>
        <form id="settings-form">
            <div class="form-group">
                <label for="protocol">Protocol:</label>
                <select id="protocol" name="protocol">
                    <option value="http">HTTP</option>
                    <option value="https">HTTPS</option>
                </select>
            </div>
            <div class="form-group">
                <label for="port">Port:</label>
                <input type="number" id="port" name="port" min="1" max="65535" value="8080">
            </div>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </div>
            <div class="form-group">
                <label for="bandwidth">Bandwidth Limit (MB/s):</label>
                <input type="number" id="bandwidth" name="bandwidth" min="0" value="0">
            </div>
            <div class="form-group">
                <label for="authentication">Authentication:</label>
                <input type="checkbox" id="authentication" name="authentication">
            </div>
            <input type="submit" value="Save">
        </form>
    </div>
</body>
</html>
