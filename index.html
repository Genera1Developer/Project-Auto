<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS styles for index.html */

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #333;
            background-color: #f5f5f5;
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            padding: 20px;
            background-color: #333;
            color: #fff;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar li {
            margin-bottom: 10px;
        }

        .sidebar li a {
            display: block;
            padding: 5px 10px;
            color: #fff;
            text-decoration: none;
        }

        .sidebar li a:hover {
            background-color: #444;
        }

        .sidebar li a.active {
            background-color: #555;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
        }

        .content h1 {
            margin-top: 0;
        }

        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
        }

        .form-wrapper {
            width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
        }

        .form-input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .form-button {
            padding: 5px 10px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-message {
            color: #d9534f;
            font-weight: bold;
            margin-top: 10px;
        }

        .success-message {
            color: #4caf50;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background-color: #d9534f;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .connection-status {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <ul>
                <li><a href="/index.html" class="active">Home</a></li>
                <li><a href="/settings.html">Settings</a></li>
                <li><a href="/dashboard.html">Dashboard</a></li>
            </ul>
        </aside>
        <main class="content">
            <h1>Web Proxy</h1>
            <div class="form-container">
                <div class="form-wrapper">
                    <form id="login-form">
                        <div class="form-group">
                            <label for="username">Username:</label>
                            <input type="text" id="username" class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="password">Password:</label>
                            <input type="password" id="password" class="form-input">
                        </div>
                        <div class="form-group">
                            <input type="submit" value="Login" class="form-button">
                        </div>
                    </form>
                    <div class="error-message" id="error-message"></div>
                    <div class="success-message" id="success-message"></div>
                </div>
            </div>
            <div class="connection-status">
                <div class="status-indicator"></div>
                <span id="connection-status">Proxy Not Connected</span>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
