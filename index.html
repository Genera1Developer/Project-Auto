<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="sidebar">
      <ul>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" />
        </div>
        <div class="button-container">
          <button type="submit">Login</button>
        </div>
      </form>

      <div class="error-message" id="error-message"></div>
      <div class="connection-status" id="connection-status">
        <span>Proxy Status:</span>
        <span id="proxy-status"></span>
      </div>
      <div class="monitoring-controls">
        <button id="start-proxy-button" type="button">Start Proxy</button>
        <button id="stop-proxy-button" type="button">Stop Proxy</button>
        <button id="refresh-data-button" type="button">Refresh Data</button>
      </div>
    </div>
  </div>
