<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="sidebar">
    <a href="./index.html">Home</a>
    <a href="./settings.html">Settings</a>
    <a href="./dashboard.html">Dashboard</a>
  </div>

  <main>
    <div class="container">
      <h1>Proxy Settings</h1>

      <form id="settings-form">
        <div class="form-group">
          <label for="protocol">Protocol:</label>
          <select id="protocol">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
          </select>
        </div>

        <div class="form-group">
          <label for="port">Port:</label>
          <input type="number" id="port" />
        </div>

        <div class="form-group">
          <label for="authentication">Authentication:</label>
          <input type="checkbox" id="authentication" />
        </div>

        <div class="form-group" id="auth-settings" style="display: none;">
          <label for="auth-username">Username:</label>
          <input type="text" id="auth-username" />

          <label for="auth-password">Password:</label>
          <input type="password" id="auth-password" />
        </div>

        <div class="form-group">
          <label for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
          <input type="number" id="bandwidth-limit" />
        </div>

        <button type="submit">Save</button>
      </form>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
