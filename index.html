<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Blue Web Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* CSS Styles for settings.html */
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #000;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #0099ff;
      border-radius: 5px;
      padding: 1rem;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #007acc;
    }

    .sidebar a.active {
      background-color: #007acc;
    }

    .content {
      flex-grow: 1;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .settings-field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .settings-field label {
      width: 100px;
      font-weight: bold;
    }

    .settings-field input,
    .settings-field select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .settings-field button {
      padding: 0.5rem 1rem;
      border: 1px solid #0099ff;
      border-radius: 5px;
      background-color: #0099ff;
      color: #fff;
      cursor: pointer;
    }

    .settings-field button:hover {
      background-color: #007acc;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <aside class="sidebar">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/settings.html" class="active">Settings</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
      </ul>
    </aside>
    <main class="content">
      <h1>Baby Blue Web Proxy Settings</h1>
      <form action="#" class="settings-form">
        <div class="settings-field">
          <label for="protocol">Protocol:</label>
          <select id="protocol">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
          </select>
        </div>
        <div class="settings-field">
          <label for="port">Port:</label>
          <input type="number" id="port" />
        </div>
        <div class="settings-field">
          <label for="username">Username:</label>
          <input type="text" id="username" />
        </div>
        <div class="settings-field">
          <label for="password">Password:</label>
          <input type="password" id="password" />
        </div>
        <div class="settings-field">
          <label for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
          <input type="number" id="bandwidth-limit" />
        </div>
        <div class="settings-field">
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
```
