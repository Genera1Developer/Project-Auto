<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="scripts.js"></script>
</head>

<body>
  <div class="wrapper">
    <div class="sidebar bg-blue-500 rounded-lg p-4">
      <ul>
        <li>
          <a href="/index.html" class="text-white hover:bg-blue-600">Home</a>
        </li>
        <li>
          <a href="/settings.html" class="text-white hover:bg-blue-600">Settings</a>
        </li>
        <li>
          <a href="/dashboard.html" class="text-white hover:bg-blue-600">Dashboard</a>
        </li>
      </ul>
    </div>
    <div class="content flex-1 p-4">
      <div class="login-form">
        <h2 class="text-xl font-bold mb-4">Login</h2>
        <form id="login-form">
          <div class="mb-4">
            <label for="username" class="block text-sm font-medium mb-2">Username</label>
            <input type="text" id="username" name="username" class="bg-white border border-gray-300 rounded-md w-full p-2">
          </div>
          <div class="mb-4">
            <label for="password" class="block text-sm font-medium mb-2">Password</label>
            <input type="password" id="password" name="password" class="bg-white border border-gray-300 rounded-md w-full p-2">
          </div>
          <div class="flex items-center justify-between">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-md p-2">
              Login
            </button>
          </div>
        </form>
      </div>
      <div class="proxy-status mt-4">
        <h3 class="text-lg font-bold mb-2">Proxy Status</h3>
        <div class="flex items-center justify-between">
          <div class="text-green-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline-block mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M19.5 12l-2-2-4 4" />
            </svg>
            Connected
          </div>
          <div class="text-sm">
            Last updated: <span id="last-updated"></span>
          </div>
        </div>
      </div>
      <div class="error-message mt-4">
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
          <strong class="font-bold">Error!</strong>
          <span class="block sm:inline">The proxy server is currently experiencing issues.</span>
          <span class="absolute top-0 bottom-0 right-0 px-4 py-3">
            <svg class="h-6 w-6 text-red-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </span>
        </div>
      </div>
      <div class="connection-status mt-4">
        <h3 class="text-lg font-bold mb-2">Connection Status</h3>
        <div class="flex items-center justify-between">
          <div class="text-sm">
            <span>IP Address:</span>
            <span id="ip-address"></span>
          </div>
          <div class="text-sm">
            <span>Hostname:</span>
            <span id="hostname"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
