<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Blue Web Proxy</title>

  <style>
    /* CSS Styles for index.html */
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #000;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #0099ff;
      border-radius: 5px;
      padding: 1rem;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #007acc;
    }

    .sidebar a.active {
      background-color: #007acc;
    }

    .content {
      flex-grow: 1;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      gap: 0.5rem;
    }

    label {
      width: 100px;
    }

    .form-input {
      flex-grow: 1;
    }

    .form-button {
      padding: 0.5rem 1rem;
      border-radius: 5px;
      background-color: #0099ff;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .form-button:hover {
      background-color: #007acc;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #f00;
    }

    .status-indicator--connected {
      background-color: #0f0;
    }

    .error-message {
      color: #f00;
    }

    .connection-status {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <aside class="sidebar">
      <ul>
        <li><a href="/index.html" class="active">Home</a></li>
        <li><a href="/settings.html">Settings</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
      </ul>
    </aside>
    <main class="content">
      <h1>Baby Blue Web Proxy</h1>
      <div class="status-indicator"></div>
      <span class="connection-status">Connecting...</span>
      <div class="error-message"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" class="form-input" required />
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" class="form-input" required />
        </div>
        <div class="form-group">
          <input type="submit" value="Login" class="form-button" />
          <input type="reset" value="Reset" class="form-button" />
        </div>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
