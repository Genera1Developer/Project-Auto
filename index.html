<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="scripts.js"></script>
</head>

<body>
  <div class="wrapper">
    <div class="sidebar bg-blue-500 rounded-lg p-4">
      <ul>
        <li>
          <a href="/index.html" class="text-white hover:bg-blue-600">Home</a>
        </li>
        <li>
          <a href="/settings.html" class="text-white hover:bg-blue-600">Settings</a>
        </li>
        <li>
          <a href="/dashboard.html" class="text-white hover:bg-blue-600">Dashboard</a>
        </li>
      </ul>
    </div>
    <div class="content flex-1 p-4">
      <div class="card bg-white rounded-lg p-4 shadow-md">
        <h2 class="text-xl font-bold mb-4">Proxy Configuration</h2>
        <form id="settings-form" action="/settings" method="POST">
          <div class="mb-4">
            <label for="protocol" class="block">Protocol:</label>
            <select name="protocol" id="protocol" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-blue-400">
              <option value="http">HTTP</option>
              <option value="https">HTTPS</option>
            </select>
          </div>
          <div class="mb-4">
            <label for="port" class="block">Port:</label>
            <input type="number" name="port" id="port" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-blue-400" />
          </div>
          <div class="mb-4">
            <label for="authentication" class="block">Authentication:</label>
            <input type="checkbox" name="authentication" id="authentication" class="mr-2" />
            <label for="authentication">Enable Authentication</label>
          </div>
          <div class="mb-4" id="authentication-settings" style="display: none;">
            <label for="username" class="block">Username:</label>
            <input type="text" name="username" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-blue-400" />
            <label for="password" class="block">Password:</label>
            <input type="password" name="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-blue-400" />
          </div>
          <div class="mb-4">
            <label for="bandwidth-limit" class="block">Bandwidth Limit:</label>
            <input type="number" name="bandwidth-limit" id="bandwidth-limit" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-blue-400" />
          </div>
          <button type="submit" class="px-4 py-2 rounded-md bg-blue-400 text-white hover:bg-blue-500">Save</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
```
