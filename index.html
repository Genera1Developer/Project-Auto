<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="module" src="./settings.js" defer></script>
</head>

<body>
  <div class="container">
    <header class="header">
      <nav class="links">
        <a href="/" class="link">Home</a>
        <a href="/settings.html" class="link active">Settings</a>
        <a href="/dashboard.html" class="link">Dashboard</a>
      </nav>
      <div class="logo">
        <h1>Web Proxy</h1>
      </div>
    </header>
    <main class="main-content">
      <form id="proxy-settings-form" action="/save_settings" method="POST" autocomplete="off" novalidate>
        <h2 class="page-title">Proxy Configuration</h2>
        <p>Configure your proxy settings here. Leaving any field blank will disable the corresponding option.</p>
        <fieldset>
          <legend>Proxy Settings</legend>
          <div class="field-container">
            <label class="label" for="proxy-protocol">Protocol:</label>
            <select id="proxy-protocol" name="protocol" aria-label="Proxy Protocol" required>
              <option value="" disabled selected>Select</option>
              <option value="HTTP">HTTP</option>
              <option value="HTTPS">HTTPS</option>
              <option value="SOCKS">SOCKS</option>
              <option value="SOCKS5">SOCKS5</option>
            </select>
          </div>
          <div class="field-container">
            <label class="label" for="proxy-host">Host IP or Domain:</label>
            <input id="proxy-host" name="host" type="text" aria-label="Proxy Host"
              pattern="^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$"
              required />
          </div>
          <div class="field-container">
            <label class="label" for="proxy-port">Port:</label>
            <input id="proxy-port" name="port" type="number" min="0" max="65535" aria-label="Proxy Port" required />
          </div>
          <div class="field-container">
            <label class="label" for="proxy-authentication">Proxy Authentication (Optional):</label>
            <input id="proxy-authentication" name="authentication" type="text" aria-label="Proxy Authentication"
              pattern="^([^:]+):(.+)?$" placeholder="username:password" />
          </div>
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limit (Optional)</legend>
          <div class="field-container">
            <label class="label" for="bandwidth-limit">Limit (MB/s):</label>
            <input id="bandwidth-limit" name="bandwidth_limit" type="number" min="0" aria-label="Bandwidth Limit"
              placeholder="0 to disable" />
          </div>
        </fieldset>
        <div class="button-container">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
          <a href="/dashboard.html" class="btn btn-link">Cancel</a>
        </div>
      </form>
    </main>
    <footer class="footer">
      Copyright &copy; 2023 Web Proxy
    </footer>
  </div>
</body>

</html>
