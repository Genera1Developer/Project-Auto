<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Proxy</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>

<body>
  <div class="container grid">
    <div class="sidebar-nav col-span-1 bg-blue-50 rounded-md">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/settings">Settings</a></li>
      </ul>
    </div>
    <div class="main-content col-span-5">
      <div class="header bg-blue-100 rounded-md py-2 px-3">
        <h1 class="text-xl">Web Proxy</h1>
        <div class="header-nav">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/settings">Settings</a></li>
          </ul>
        </div>
      </div>
      <div class="content py-2 px-3">
        <form id="login-form">
          <h2 class="text-xl mb-6">Login</h2>
          <div class="form-group">
            <label class="form-label block" for="username">Username</label>
            <input class="form-input" type="text" name="username" id="username" />
          </div>
          <div class="form-group">
            <label class="form-label block" for="password">Password</label>
            <input class="form-input" type="password" name="password" id="password" />
          </div>
          <button type="submit" class="form-button mt-6">Login</button>
        </form>
        <div class="error-message hidden"></div>
        <div class="proxy-status mt-6">
          <strong>Proxy Status:</strong> <span id="proxy-status"></span>
        </div>
        <div class="connection-log mt-6">
          <strong>Connection Log:</strong>
          <ul id="connection-log"></ul>
        </div>
      </div>
    </div>
  </div>
  <script src="/public/scripts.js"></script>
</body>

</html>
