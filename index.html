```html
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Proxy Login</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <div class="container grid grid-cols-6 gap-4 max-w-screen-lg mx-auto">
      <aside class="col-span-1 bg-blue-50 h-screen">
        <div class="sidebar-nav">
          <ul>
            <li>
              <a href="/index.html" class="block px-3 py-2 rounded-md bg-blue-100">
                Home
              </a>
            </li>
            <li>
              <a href="/settings.html" class="block px-3 py-2 rounded-md bg-blue-100">
                Settings
              </a>
            </li>
            <li>
              <a href="/dashboard.html" class="block px-3 py-2 rounded-md bg-blue-100">
                Dashboard
              </a>
            </li>
          </ul>
        </div>
      </aside>
      <main class="col-span-5">
        <div class="py-6">
          <h1 class="text-2xl font-bold">Proxy Login</h1>
          <p>
            Please enter your username and password to access the proxy.
          </p>
          <form
            id="login-form"
            action="/login"
            method="POST"
            class="mt-6"
          >
            <div>
              <label for="username" class="block mb-2">Username:</label>
              <input
                type="text"
                id="username"
                name="username"
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                required
              />
            </div>
            <div class="mt-6">
              <label for="password" class="block mb-2">Password:</label>
              <input
                type="password"
                id="password"
                name="password"
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                required
              />
            </div>
            <div class="error-message hidden"></div>
            <div class="mt-6">
              <button
                type="submit"
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
              >
                Login
              </button>
            </div>
          </form>
        </div>
        <div class="connection-status mt-6">
          <h2 class="text-xl font-bold">Proxy Status</h2>
          <span
            id="proxy-status"
            class="text-gray-700"
            >Not connected</span
          >
        </div>
      </main>
    </div>
    <script src="/public/scripts.js"></script>
  </body>
</html>

```
