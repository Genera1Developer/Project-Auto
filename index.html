<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Web Proxy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="wrapper flex">
    <div class="sidebar bg-babyblue-100 rounded-r-lg p-4 w-1/4">
      <ul>
        <li class="active"><a href="/index.html">Home</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/settings.html">Settings</a></li>
      </ul>
    </div>
    <div class="content flex-1 p-4">
      <h1 class="text-3xl font-bold mb-4">Web Proxy</h1>
      <div class="card bg-white rounded-lg p-4 shadow-md">
        <h2 class="text-xl font-bold mb-4">Login</h2>
        <form id="login-form">
          <label for="username" class="block mb-2 text-sm font-bold text-gray-700">Username</label>
          <input type="text" id="username" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline mb-4" />
          <label for="password" class="block mb-2 text-sm font-bold text-gray-700">Password</label>
          <input type="password" id="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" />
          <button type="submit" class="bg-babyblue-500 hover:bg-babyblue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline mt-4">
            Login
          </button>
        </form>
      </div>

      <div class="card bg-white rounded-lg p-4 shadow-md mt-4">
        <h2 class="text-xl font-bold mb-4">Status</h2>
        <ul>
          <li><span id="proxy-status" class="text-sm font-bold text-gray-700">Status: </span><span id="proxy-status-value" class="text-sm font-semibold"></span></li>
          <li><span id="connection-status" class="text-sm font-bold text-gray-700">Connection: </span><span id="connection-status-value" class="text-sm font-semibold"></span></li>
          <li><span id="error-message" class="text-sm font-bold text-red-500"></span></li>
        </ul>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>

</html>
```
