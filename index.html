<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>

<body>
  <div class="container grid">
    <div class="sidebar-nav col-span-1 bg-blue-50 rounded-md">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/settings">Settings</a></li>
      </ul>
    </div>
    <div class="main-content col-span-5">
      <div class="header bg-blue-100 rounded-md py-2 px-3">
        <h1 class="text-xl">Web Proxy Settings</h1>
        <div class="header-nav">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/settings">Settings</a></li>
          </ul>
        </div>
      </div>
      <div class="content py-2 px-3">
        <form id="settings-form">
          <h2 class="text-xl mb-6">Proxy Configuration</h2>
          <div class="form-group">
            <label class="form-label block" for="proxy-type">Proxy Type</label>
            <select class="form-input" name="proxy-type" id="proxy-type">
              <option value="http">HTTP</option>
              <option value="https">HTTPS</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label block" for="proxy-port">Proxy Port</label>
            <input class="form-input" type="number" name="proxy-port" id="proxy-port" />
          </div>
          <div class="form-group">
            <label class="form-label block" for="username">Username</label>
            <input class="form-input" type="text" name="username" id="username" />
          </div>
          <div class="form-group">
            <label class="form-label block" for="password">Password</label>
            <input class="form-input" type="password" name="password" id="password" />
          </div>
          <div class="form-group">
            <label class="form-label block" for="bandwidth-limit">Bandwidth Limit (MB/s)</label>
            <input class="form-input" type="number" name="bandwidth-limit" id="bandwidth-limit" />
          </div>
          <button type="submit" class="form-button mt-6">Save Settings</button>
        </form>
      </div>
    </div>
  </div>
  <script src="/public/scripts.js"></script>
</body>

</html>
```
