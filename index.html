<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Web Proxy Settings</h1>
    </header>
    <nav class="sidebar">
      <a href="/index.html" class="nav-link">Home</a>
      <a href="/settings.html" class="nav-link active">Settings</a>
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
    </nav>
    <main class="main-content">
      <form id="proxy-settings-form">
        <fieldset>
          <legend>Proxy Configuration</legend>
          <label for="proxy-protocol">Protocol:</label>
          <select id="proxy-protocol" required>
            <option value="HTTP">HTTP</option>
            <option value="HTTPS">HTTPS</option>
          </select>
          <label for="proxy-port">Port:</label>
          <input type="number" id="proxy-port" min="0" step="1" required />
          <label for="proxy-authentication">Authentication:</label>
          <input type="text" id="proxy-authentication" />
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limit</legend>
          <label for="bandwidth-limit">Limit (MB/s):</label>
          <input type="number" id="bandwidth-limit" min="0" />
        </fieldset>
        <button type="submit">Save Settings</button>
      </form>
    </main>
  </div>
  <script src="settings.js"></script>
</body>

</html>
