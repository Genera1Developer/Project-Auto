<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>

<body>
  <div class="container grid">
    <div class="sidebar-nav col-span-1 bg-blue-50 rounded-md">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/settings">Settings</a></li>
      </ul>
    </div>
    <div class="main-content col-span-5">
      <div class="header bg-blue-100 rounded-md py-2 px-3">
        <h1 class="text-xl">Web Proxy Settings</h1>
        <div class="header-nav">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/settings">Settings</a></li>
          </ul>
        </div>
      </div>
      <div class="content py-2 px-3">
        <form id="settings-form">
          <div class="grid-container gap-6">
            <div class="card bg-blue-50 rounded-md p-3">
              <div class="card-header">
                <h2 class="card-title">Proxy Configuration</h2>
              </div>
              <div class="card-body">
                <div class="field-group">
                  <label for="protocol">Protocol:</label>
                  <select id="protocol">
                    <option value="http">HTTP</option>
                    <option value="https">HTTPS</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="port">Port:</label>
                  <input type="number" id="port" min="1" max="65535" value="8080" />
                </div>
                <div class="field-group">
                  <label for="authentication">Authentication:</label>
                  <select id="authentication">
                    <option value="none">None</option>
                    <option value="basic">Basic</option>
                    <option value="digest">Digest</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="username">Username:</label>
                  <input type="text" id="username" />
                </div>
                <div class="field-group">
                  <label for="password">Password:</label>
                  <input type="password" id="password" />
                </div>
              </div>
            </div>
            <div class="card bg-blue-50 rounded-md p-3">
              <div class="card-header">
                <h2 class="card-title">Bandwidth Limits</h2>
              </div>
              <div class="card-body">
                <div class="field-group">
                  <label for="upload-limit">Upload Limit:</label>
                  <input type="number" id="upload-limit" min="0" value="0" />
                </div>
                <div class="field-group">
                  <label for="download-limit">Download Limit:</label>
                  <input type="number" id="download-limit" min="0" value="0" />
                </div>
              </div>
            </div>
          </div>
          <div class="button-group">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="/public/scripts.js"></script>
</body>

</html>
```
