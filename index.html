<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Proxy - Proxy Settings</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="module" src="./settings.js" defer></script>
</head>

<body class="settings-page">
  <div class="container">
    <header class="header">
      <h1 class="logo">Web Proxy</h1>
      <nav class="nav">
        <a href="/" class="link">Home</a>
        <a href="/settings.html" class="link active">Proxy Settings</a>
        <a href="/dashboard.html" class="link">Dashboard</a>
      </nav>
    </header>
    <main class="main-content">
      <h1 class="page-title">Proxy Settings</h1>
      <p>Configure your proxy settings here. Leaving any field blank will disable the corresponding option.</p>
      <form id="proxy-settings-form" class="form-container" action="#" method="POST" autocomplete="off" novalidate>
        <fieldset>
          <legend>Proxy Settings</legend>
          <div class="form-group">
            <label for="proxy-protocol">Protocol:</label>
            <select id="proxy-protocol" name="protocol" required>
              <option value="" disabled selected>Select</option>
              <option value="HTTP">HTTP</option>
              <option value="HTTPS">HTTPS</option>
              <option value="SOCKS">SOCKS</option>
              <option value="SOCKS5">SOCKS5</option>
            </select>
          </div>
          <div class="form-group">
            <label for="proxy-host">Host IP or Domain:</label>
            <input id="proxy-host" name="host" type="text" pattern="^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$)" required>
            <span class="error-message" id="host-error-message"></span>
          </div>
          <div class="form-group">
            <label for="proxy-port">Port:</label>
            <input id="proxy-port" name="port" type="number" min="0" max="65535" required>
            <span class="error-message" id="port-error-message"></span>
          </div>
          <div class="form-group">
            <label for="proxy-authentication">Proxy Authentication (Optional):</label>
            <input id="proxy-authentication" name="authentication" type="text" pattern="^([^:]+):(.+)?$" placeholder="username:password">
            <span class="error-message" id="authentication-error-message"></span>
          </div>
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limit (Optional)</legend>
          <div class="form-group">
            <label for="bandwidth-limit">Limit (MB/s):</label>
            <input id="bandwidth-limit" name="bandwidth_limit" type="number" min="0" placeholder="0 to disable">
          </div>
        </fieldset>
        <div class="button-container">
          <button class="button button--primary" type="submit">Save</button>
          <button class="button button--secondary" type="reset">Reset</button>
          <a href="/dashboard.html" class="button button--link">Cancel</a>
        </div>
      </form>
    </main>
    <footer class="footer">
      <p>Copyright © 2023 Web Proxy</p>
    </footer>
  </div>
</body>

</html>
