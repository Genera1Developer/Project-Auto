<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Blue Web Proxy</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* CSS Styles for settings.html */
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #000;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #0099ff;
      border-radius: 5px;
      padding: 1rem;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #007acc;
    }

    .sidebar a.active {
      background-color: #007acc;
    }

    .content {
      flex-grow: 1;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .settings-input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .settings-button {
      padding: 0.5rem 1rem;
      background-color: #0099ff;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <aside class="sidebar">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/settings.html" class="active">Settings</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
      </ul>
    </aside>
    <main class="content">
      <h1>Baby Blue Web Proxy</h1>
      <form class="settings-form">
        <label for="protocol">Protocol:</label>
        <select id="protocol" class="settings-input">
          <option value="http">HTTP</option>
          <option value="https">HTTPS</option>
        </select>

        <label for="port">Port:</label>
        <input type="number" id="port" class="settings-input" />

        <label for="username">Username:</label>
        <input type="text" id="username" class="settings-input" />

        <label for="password">Password:</label>
        <input type="password" id="password" class="settings-input" />

        <label for="bandwidth-limit">Bandwidth Limit (MB):</label>
        <input type="number" id="bandwidth-limit" class="settings-input" />

        <input type="submit" value="Save" class="settings-button" />
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
