<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Blue Web Proxy</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* CSS Styles for dashboard.html */
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #000;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #0099ff;
      border-radius: 5px;
      padding: 1rem;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #007acc;
    }

    .sidebar a.active {
      background-color: #007acc;
    }

    .content {
      flex-grow: 1;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    .dashboard-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .dashboard-stat {
      width: 100%;
      padding: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: center;
    }

    .dashboard-graph {
      width: 100%;
      height: 200px;
      background-color: #eee;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .dashboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .dashboard-table th,
    .dashboard-table td {
      padding: 0.5rem;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <aside class="sidebar">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/settings.html">Settings</a></li>
        <li><a href="/dashboard.html" class="active">Dashboard</a></li>
      </ul>
    </aside>
    <main class="content">
      <h1>Baby Blue Web Proxy</h1>
      <div class="dashboard-stats">
        <div class="dashboard-stat">
          <h2>Active Connections</h2>
          <p id="active-connections">0</p>
        </div>
        <div class="dashboard-stat">
          <h2>Total Bandwidth Used</h2>
          <p id="total-bandwidth">0 MB</p>
        </div>
        <div class="dashboard-stat">
          <h2>Average Response Time</h2>
          <p id="average-response-time">0 ms</p>
        </div>
      </div>
      <div class="dashboard-graph"></div>
      <table class="dashboard-table">
        <thead>
          <tr>
            <th>IP Address</th>
            <th>Connection Time</th>
            <th>Response Time</th>
            <th>Status Code</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
