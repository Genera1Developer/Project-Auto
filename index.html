
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Proxy - Login Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Web Proxy</h1>
    <nav>
      <ul>
        <li><a href="#/">Home</a></li>
        <li><a href="#/settings">Settings</a></li>
        <li><a href="#/dashboard">Dashboard</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="login-form">
      <h2>Login</h2>
      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username">
        <label for="password">Password</label>
        <input type="password" id="password">
        <button type="submit">Login</button>
      </form>
    </section>
    <section class="status-indicators">
      <div class="proxy-status">Proxy Status: <span id="proxy-status">Not connected</span></div>
      <div class="connection-status">Connection Status: <span id="connection-status">Idle</span></div>
    </section>
    <section class="error-messages">
      <ul id="error-messages"></ul>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
