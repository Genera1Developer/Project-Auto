<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Web Proxy Settings</h1>
    </header>
    <nav class="sidebar">
      <ul>
        <li><a href="/index.html" class="nav-link">Home</a></li>
        <li><a href="/settings.html" class="nav-link active">Settings</a></li>
        <li><a href="/dashboard.html" class="nav-link">Dashboard</a></li>
      </ul>
    </nav>
    <main class="main-content">
      <h2>Proxy Configuration</h2>
      <form id="proxy-settings-form" action="/save_settings" method="post">
        <fieldset>
          <legend>Proxy Settings</legend>
          <label for="proxy-protocol">Protocol:</label>
          <select id="proxy-protocol" name="protocol" required>
            <option value="HTTP" selected>HTTP</option>
            <option value="HTTPS">HTTPS</option>
            <option value="SOCKS">SOCKS</option>
            <option value="SOCKS5">SOCKS5</option>
          </select>
          <label for="proxy-host">Host (IP or domain):</label>
          <input type="text" id="proxy-host" name="host" required />
          <label for="proxy-port">Port:</label>
          <input type="number" id="proxy-port" name="port" min="0" step="1" required value="8080" />
          <label for="proxy-authentication">Authentication:</label>
          <input type="text" id="proxy-authentication" name="authentication" placeholder="username:password" />
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limit</legend>
          <label for="bandwidth-limit">Limit (MB/s):</label>
          <input type="number" id="bandwidth-limit" name="bandwidth_limit" min="0" value="10" />
        </fieldset>
        <button type="submit">Save Settings</button>
      </form>
    </main>
  </div>
  <script type="module" src="settings.js"></script>
</body>

</html>
