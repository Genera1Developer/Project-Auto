<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Web Proxy Settings</h1>
    </header>
    <nav class="sidebar">
      <ul>
        <li><a href="/index.html" class="nav-link">Home</a></li>
        <li><a href="/settings.html" class="nav-link active">Settings</a></li>
        <li><a href="/dashboard.html" class="nav-link">Dashboard</a></li>
      </ul>
    </nav>
    <main class="main-content">
      <h2>Proxy Configuration</h2>
      <form id="proxy-settings-form" action="/save_settings" method="post" novalidate>
        <fieldset>
          <legend>Proxy Settings</legend>
          <label for="proxy-protocol">Proxy Protocol:</label>
          <select id="proxy-protocol" name="protocol" required>
            <option value="HTTP" selected>HTTP</option>
            <option value="HTTPS">HTTPS</option>
            <option value="SOCKS">SOCKS</option>
            <option value="SOCKS5">SOCKS5</option>
          </select>
          <label for="proxy-host">Proxy Server (IP or domain):</label>
          <input type="text" id="proxy-host" name="host" pattern="^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$" title="Must be a valid IP address or domain" required />
          <label for="proxy-port">Proxy Server Port:</label>
          <input type="number" min="0" max="65535" step="1" id="proxy-port" name="port" required />
          <label for="proxy-authentication">Proxy Authentication (optional):</label>
          <input id="proxy-authentication" name="authentication" placeholder="username:password" type="text" />
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limit (optional)</legend>
          <label for="bandwidth-limit">Limit (MB/s):</label>
          <input type="number" min="0" id="bandwidth-limit" name="bandwidth_limit" />
          <small>Enter 0 to disable bandwidth limit.</small>
        </fieldset>
        <div class="button-container">
          <button type="submit">Save Settings</button>
          <button type="reset">Reset Settings</button>
        </div>
      </form>
    </main>
  </div>
  <script type="module" src="settings.js"></script>
</body>

</html>
