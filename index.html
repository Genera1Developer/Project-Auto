<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Blue Web Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* CSS Styles for settings.html */
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #000;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #0099ff;
      border-radius: 5px;
      padding: 1rem;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #007acc;
    }

    .sidebar a.active {
      background-color: #007acc;
    }

    .content {
      flex-grow: 1;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    .form-container {
      background-color: #fff;
      padding: 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
    }

    input,
    select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #0099ff;
      color: #fff;
    }

    .error {
      color: #d6332f;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <aside class="sidebar">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/settings.html" class="active">Settings</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
      </ul>
    </aside>
    <main class="content">
      <h1>Baby Blue Web Proxy Settings</h1>
      <form id="settings-form">
        <div class="form-container">
          <h2 class="form-title">Proxy Configuration</h2>
          <div class="form-group">
            <label for="protocol">Protocol:</label>
            <select name="protocol">
              <option value="http">HTTP</option>
              <option value="https">HTTPS</option>
            </select>
          </div>
          <div class="form-group">
            <label for="port">Port:</label>
            <input type="number" name="port" min="1" max="65535" value="8080" />
          </div>
          <div class="form-group">
            <label for="authentication">Authentication:</label>
            <input type="checkbox" name="authentication" />
          </div>
          <div class="form-group" id="authentication-options" style="display: none;">
            <label for="username">Username:</label>
            <input type="text" name="username" />
            <label for="password">Password:</label>
            <input type="password" name="password" />
          </div>
          <div class="form-group">
            <label for="bandwidth-limit">Bandwidth Limit (MB/s):</label>
            <input type="number" name="bandwidth-limit" min="0" />
          </div>
        </div>
        <button type="submit">Save</button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
