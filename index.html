<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Proxy Settings</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica', 'Arial', sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: #0099ff;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
    }

    .sidebar a {
      text-decoration: none;
      color: #fff;
      font-size: 1.2rem;
      margin: 1rem;
    }

    .sidebar a:hover {
      color: #007acc;
    }

    .main-content {
      padding: 1rem;
      overflow: scroll;
    }

    .main-content h1 {
      margin-top: 0;
    }

    .main-content form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .main-content label {
      font-weight: bold;
    }

    .main-content input,
    .main-content select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .main-content button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      background: #0099ff;
      color: #fff;
      cursor: pointer;
    }

    .main-content button:hover {
      background: #007acc;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="sidebar">
      <a href="/index.html">Home</a>
      <a href="/settings.html" class="active">Settings</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
    <div class="main-content">
      <h1>Web Proxy Settings</h1>
      <form>
        <label for="proxy-protocol">Proxy Protocol</label>
        <select id="proxy-protocol">
          <option value="http">HTTP</option>
          <option value="https">HTTPS</option>
        </select>

        <label for="proxy-port">Proxy Port</label>
        <input type="number" id="proxy-port">

        <label for="proxy-authentication">Proxy Authentication</label>
        <input type="text" id="proxy-authentication">

        <label for="bandwidth-limit">Bandwidth Limit (MB/s)</label>
        <input type="number" id="bandwidth-limit">

        <button type="submit">Save Settings</button>
      </form>
    </div>
  </div>
  <script>
    // Implement the settings functionality here
  </script>
</body>

</html>
