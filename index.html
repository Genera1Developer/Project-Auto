<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Proxy - Settings</title>
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./settings.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="/">
        <h1>Web Proxy</h1>
      </a>
      <nav class="links">
        <a href="/">Home</a>
        <a href="/settings.html" class="active">Settings</a>
        <a href="/dashboard.html">Dashboard</a>
      </nav>
    </header>
    <main class="main-content">
      <h2 class="page-title">Proxy Configuration</h2>
      <p>Configure your proxy settings here. Leaving any field blank will disable the corresponding option.</p>
      <form id="proxy-settings-form" action="/save_settings" method="POST" autocomplete="off" novalidate>
        <fieldset>
          <legend>Proxy Settings</legend>
          <div class="field-container">
            <label class="label" for="proxy-protocol">Protocol:</label>
            <select id="proxy-protocol" name="protocol" required>
              <option value="" disabled>Select</option>
              <option value="HTTP">HTTP</option>
              <option value="HTTPS">HTTPS</option>
              <option value="SOCKS">SOCKS</option>
              <option value="SOCKS5">SOCKS5</option>
            </select>
          </div>
          <div class="field-container">
            <label class="label" for="proxy-host">Host IP or Domain:</label>
            <input id="proxy-host" name="host" type="text" pattern="^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$" required>
          </div>
          <div class="field-container">
            <label class="label" for="proxy-port">Port:</label>
            <input id="proxy-port" name="port" type="number" min="0" max="65535" step="1" required>
          </div>
          <div class="field-container">
            <label class="label" for="proxy-authentication">Proxy Authentication (Optional):</label>
            <input id="proxy-authentication" name="authentication" type="text" pattern="^([^:]+):(.+)?$">
          </div>
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limit (Optional)</legend>
          <div class="field-container">
            <label class="label" for="bandwidth-limit">Limit (MB/s):</label>
            <input id="bandwidth-limit" name="bandwidth_limit" type="number" min="0">
          </div>
          <small>Leave blank to disable bandwidth limit.</small>
        </fieldset>
        <div class="button-container">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
          <button type="button" class="btn btn-link" onclick="location.href='/dashboard.html';">Cancel</button>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
