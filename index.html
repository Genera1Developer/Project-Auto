<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Blue Web Proxy Settings</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* CSS Styles for settings.html */
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #000;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #0099ff;
      border-radius: 5px;
      padding: 1rem;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 1rem;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #007acc;
    }

    .sidebar a.active {
      background-color: #007acc;
    }

    .content {
      flex-grow: 1;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .button-container {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      background-color: #0099ff;
      color: #fff;
      cursor: pointer;
    }

    .button:hover {
      background-color: #007acc;
    }

    .error {
      color: #d6332f;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <aside class="sidebar">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/settings.html" class="active">Settings</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
      </ul>
    </aside>
    <main class="content">
      <h1>Baby Blue Web Proxy Settings</h1>
      <form id="settings-form">
        <fieldset>
          <legend>Proxy Configuration</legend>
          <label for="protocol">Protocol:</label>
          <select name="protocol">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
          </select>
          <label for="port">Port:</label>
          <input type="number" name="port" value="8080" min="1" max="65535" />
        </fieldset>
        <fieldset>
          <legend>Authentication</legend>
          <label for="username">Username:</label>
          <input type="text" name="username" />
          <label for="password">Password:</label>
          <input type="password" name="password" />
        </fieldset>
        <fieldset>
          <legend>Bandwidth Limits</legend>
          <label for="download-limit">Download Limit (MB/s):</label>
          <input type="number" name="download-limit" min="0" />
          <label for="upload-limit">Upload Limit (MB/s):</label>
          <input type="number" name="upload-limit" min="0" />
        </fieldset>
        <div class="button-container">
          <button type="submit" class="button">Save</button>
          <button type="reset" class="button">Reset</button>
        </div>
        <div class="error" id="error-message"></div>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
